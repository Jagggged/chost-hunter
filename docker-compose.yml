version: "3.8"

services:
  # ── 1. cAdvisor ──────────────────────────────────────────────
  # 각 컨테이너의 CPU, Memory, Network, Disk I/O 메트릭을 실시간 수집
  # 호스트의 cgroup, proc 등 시스템 디렉토리를 읽기 전용으로 마운트하여
  # 컨테이너별 리소스 사용량을 추출한다.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    devices:
      - /dev/kmsg
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=5s"
      - "--store_container_labels=true"
    restart: unless-stopped

  # ── 2. Prometheus ────────────────────────────────────────────
  # cAdvisor가 :8080/metrics 에 노출하는 메트릭을
  # 15초 간격으로 Pull(Scrape)하여 시계열 DB에 저장한다.
  # AI 분석 에이전트가 PromQL API(:9090)로 과거 데이터를 조회할 수 있다.
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - cadvisor
    restart: unless-stopped

  # ── 3. Grafana ───────────────────────────────────────────────
  # Prometheus를 데이터소스로 연결하여
  # 컨테이너별 리소스 사용량을 대시보드로 시각화한다.
  # 자동 프로비저닝으로 Prometheus 데이터소스가 미리 등록된다.
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
