# Grafana 대시보드 자동 프로비저닝 설정
# Grafana가 처음 뜰 때 이 경로의 JSON 파일을 읽어 대시보드를 자동 등록한다.

apiVersion: 1

providers:
  - name: "chost-hunter"
    orgId: 1
    folder: "Chost Hunter"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
